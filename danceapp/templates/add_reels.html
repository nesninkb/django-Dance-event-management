<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Media Upload</title>

<style>
:root{
  --bg1:#000;
  --bg2:#0f0f0f;
  --bg3:#1a1a1a;

  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.15);

  --text:#ffffff;
  --text-soft:#cfcfcf;
}

*{
  box-sizing:border-box;
}

body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  min-height:100vh;
  margin:0;
  padding:24px 16px;
  display:grid;
  place-items:center;
  color:var(--text);
}

.container{
  width:100%;
  max-width:540px;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(12px);
  border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  overflow:hidden;
}

.header{
  padding:26px;
  text-align:center;
  border-bottom:1px solid var(--border);
}

h1{
  margin:0;
  font-size:1.8rem;
}

.form-content{
  padding:32px;
}

label{
  display:block;
  margin:1.5rem 0 0.5rem;
  font-weight:500;
  color:var(--text-soft);
}

input[type="text"],
select,
textarea{
  width:100%;
  padding:12px 14px;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:0.95rem;
}

input::placeholder,
textarea::placeholder{
  color:#999;
}

input:focus,
select:focus,
textarea:focus{
  outline:none;
  border-color:white;
  background:rgba(255,255,255,0.08);
}

/* FIX FOR DROPDOWN OPTIONS */

select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

select option{
  background:white;
  color:black;
}

/* textarea */

textarea{
  min-height:110px;
  resize:vertical;
}

/* file input */

input[type="file"]{
  margin-top:6px;
  color:var(--text-soft);
}

/* button */

button{
  margin-top:2.2rem;
  width:100%;
  padding:14px;
  font-size:1.05rem;
  font-weight:600;
  color:black;
  background:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(255,255,255,0.25);
}

/* back button */

.back-button{
  display:inline-block;
  margin-bottom:1.5rem;
  padding:9px 15px;
  font-size:0.9rem;
  color:white;
  text-decoration:none;
  border:1px solid var(--border);
  border-radius:6px;
}

.back-button:hover{
  background:rgba(255,255,255,0.08);
}

/* hint */

.field-hint{
  font-size:0.8rem;
  color:#9ca3af;
  margin-top:6px;
}

@media (max-width:480px){
  .form-content{
    padding:24px;
  }

  h1{
    font-size:1.6rem;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Upload Media</h1>
</div>

<div class="form-content">

<a href="/institute_my_reels/" class="back-button">← Back</a>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label for="name">Name / Title</label>
<input type="text" id="name" name="name" required placeholder="e.g. Classical Dance Performance">

<label for="mediatype">Media Type</label>
<select id="mediatype" name="mediatype" required>
<option value="">— Select Type —</option>
<option value="video">Video</option>
<option value="image">Image</option>
<option value="audio">Audio</option>
</select>

<label for="category">Category</label>
<select name="category" required>
<option value="entertainment">Entertainment</option>
<option value="news">News</option>
<option value="petsandanimals">Pets & Animals</option>
<option value="education">Education</option>
<option value="music">Music</option>
<option value="gaming">Gaming</option>
<option value="sports">Sports</option>
<option value="advertisement">Advertisement</option>
<option value="travel">Travel</option>
</select>

<label for="description">Description</label>
<textarea id="description" name="description" required placeholder="Brief description of the content..."></textarea>

<label for="media">Media File</label>
<input type="file" id="media" name="media" accept="audio/*,video/*,image/*" required>

<div class="field-hint">
Max size: usually 100–500 MB depending on your server settings
</div>

<button type="submit">Upload Media</button>

</form>

</div>
</div>

</body>
</html>
