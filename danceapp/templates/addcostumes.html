{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Costume</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg: #000;
  --panel: #111;
  --card: #0d0d0d;
  --border: #222;
  --text: #ffffff;
  --muted: #aaaaaa;
  --shadow: 0 0 40px rgba(255,255,255,0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

nav{
  width:90%;
  max-width:1200px;
  margin-top:25px;
  padding:18px 30px;
  background:var(--panel);
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  text-align:center;
}

.wrapper{
  width:90%;
  max-width:1200px;
  margin:40px auto;
  display:grid;
  grid-template-columns: 1fr 350px;
  gap:30px;
}

.container, .preview{
  padding:40px;
  background:var(--panel);
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.preview-img{
  width:100%;
  height:250px;
  background:#1a1a1a;
  border-radius:12px;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#666;
  font-size:14px;
}

.tag{
  display:inline-block;
  padding:6px 10px;
  border-radius:20px;
  background:#1a1a1a;
  margin:5px 5px 0 0;
  font-size:12px;
  border:1px solid var(--border);
}

.field{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 14px;
  margin-top:8px;
}

input, textarea, select{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:white;
}

/* DROPDOWN FIX */
select{
  background:#111;
  color:white;
}

select option{
  background:#111;
  color:white;
}

.btn{
  padding:8px 16px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

.btn.primary{
  background:white;
  color:black;
  font-weight:600;
}

.size-item, .color-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:8px;
}

.color-preview{
  width:18px;
  height:18px;
  border-radius:50%;
  border:1px solid #333;
}

@media(max-width:900px){
  .wrapper{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav>
<h1><i class="fa-solid fa-shirt"></i> Add New Costume</h1>
</nav>

<div class="wrapper">

<div class="container">
<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label>Costume Name</label>
<div class="field">
<input type="text" name="name" id="nameInput" oninput="updatePreview()" required>
</div>

<label style="margin-top:20px;">Rate (₹)</label>
<div class="field">
<input type="number" name="rate" id="rateInput" step="0.01" oninput="updatePreview()" required>
</div>

<label style="margin-top:20px;">Description</label>
<div class="field">
<textarea name="desc" id="descInput" oninput="updatePreview()"></textarea>
</div>

<label style="margin-top:20px;">Image</label>
<div class="field">
<input type="file" name="image" accept="image/*" onchange="previewImage(event)">
</div>

<hr style="margin:30px 0; opacity:0.2;">

<h3>Available Sizes</h3>
<div id="sizeContainer"></div>
<button type="button" class="btn" onclick="addSize()">+ Add Size</button>

<hr style="margin:30px 0; opacity:0.2;">

<h3>Available Colors</h3>
<input type="color" id="colorPicker">
<button type="button" class="btn" onclick="addColor()">Add Color</button>
<div id="colorContainer"></div>

<br><br>
<button type="submit" class="btn primary">Save Costume</button>

</form>
</div>

<div class="preview">

<div class="preview-img" id="previewImage">No Image</div>

<h3 id="previewName">Costume Name</h3>

<p id="previewRate">₹ 0.00</p>

<p id="previewDesc" style="color:#aaa;font-size:14px;"></p>

<strong>Sizes:</strong>
<div id="previewSizes"></div>

<strong style="margin-top:15px;display:block;">Colors:</strong>
<div id="previewColors"></div>

</div>

</div>

<script>

function updatePreview(){
  previewName.innerText = nameInput.value || "Costume Name";
  previewRate.innerText = "₹ " + (rateInput.value || "0.00");
  previewDesc.innerText = descInput.value;
}

function previewImage(event){

  const reader = new FileReader();

  reader.onload = function(e){
    const previewBox = document.getElementById("previewImage");
    previewBox.style.backgroundImage = "url('" + e.target.result + "')";
    previewBox.innerHTML = "";
  };

  reader.readAsDataURL(event.target.files[0]);

}

/* SIZE DROPDOWN */

function addSize(){

  const container = document.getElementById("sizeContainer");

  const div = document.createElement("div");

  div.classList.add("size-item");

  div.innerHTML = `
    <select name="size" onchange="updatePreviewSizes()" required>
      <option value="">Select Size</option>
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
      <option>XXL</option>
      <option>Free Size</option>
    </select>

    <input type="number" name="quantity" placeholder="Qty" min="0" required>

    <button type="button" onclick="this.parentElement.remove(); updatePreviewSizes()">X</button>
  `;

  container.appendChild(div);

}

function updatePreviewSizes(){

  const preview = document.getElementById("previewSizes");

  preview.innerHTML = "";

  document.querySelectorAll("select[name='size']").forEach(select=>{

    if(select.value){

      preview.innerHTML += `<span class="tag">${select.value}</span>`;

    }

  });

}

function addColor(){

  const picker = document.getElementById("colorPicker");

  const color = picker.value;

  const container = document.getElementById("colorContainer");

  const div = document.createElement("div");

  div.classList.add("color-item");

  div.innerHTML = `
    <div class="color-preview" style="background:${color}"></div>
    <input type="hidden" name="color" value="${color}">
    <span>${color}</span>
    <button type="button" onclick="this.parentElement.remove(); updatePreviewColors()">X</button>
  `;

  container.appendChild(div);

  updatePreviewColors();

}

function updatePreviewColors(){

  const preview = document.getElementById("previewColors");

  preview.innerHTML = "";

  document.querySelectorAll("input[name='color']").forEach(input=>{

    preview.innerHTML += `<span class="tag" style="background:${input.value};border:none;">${input.value}</span>`;

  });

}

</script>

</body>
</html>
