
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Out of Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
    h1 {
      font-family: 'Great Vibes', cursive;
    }
    .floating {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    .shine {
      background: linear-gradient(to right, #22c55e 20%, #86efac 40%, #22c55e 60%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 2s linear infinite;
    }

    @keyframes shine {
      to {
        background-position: 200% center;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-green-100 to-emerald-200 flex items-center justify-center min-h-screen px-4">
  <div class="relative bg-white shadow-2xl rounded-3xl p-10 max-w-lg w-full text-center border-4 border-green-300 overflow-hidden">
    <!-- Soft background bubbles -->
    <div class="absolute w-24 h-24 bg-green-300 rounded-full opacity-30 -top-8 -left-8"></div>
    <div class="absolute w-40 h-40 bg-emerald-300 rounded-full opacity-20 -bottom-10 -right-10"></div>

    <!-- Product out-of-stock gif -->
    <img src="{% static 'assets/images/userimages/outof.gif' %}" alt="Out of Stock" class="w-40 h-40 mx-auto mb-6 floating rounded-xl shadow-lg ring-4 ring-green-200">

    <!-- Stylish heading -->
    {% comment %} <h1 class="text-5xl font-bold text-green-600 mb-3 shine">Out of Stock</h1> {% endcomment %}

    <p class="text-gray-700 text-lg mb-6">
      Sorry! <span class="font-semibold text-green-700">{{ product.productname }}</span> is currently not available.
    </p>

    <!-- CTA Button -->
    <a href="{% url 'productlist' %}" class="inline-block bg-green-500 hover:bg-green-600 text-white font-semibold px-6 py-3 rounded-full shadow-xl transition transform hover:scale-105 duration-300">
      Continue Shopping
    </a>
  </div>
</body>
</html>
