<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #121212; /* Dark Instagram-like bg */
            color: #fff;
            font-family: 'Poppins', sans-serif;
            padding-bottom: 40px;
        }

        h2 {
            color: #ff6a00;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .video-card {
            background: #1e1e1e;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .video-area video {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: transform 0.3s;
            border-radius: 0;
        }

        .video-area video:hover {
            transform: scale(1.05);
        }

        .card-body h5 {
            color: #ff6a00;
            font-weight: 600;
            margin: 0;
        }

        .description-box {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 14px;
        }

        .comments-box {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 10px;
            font-size: 14px;
        }

        .btn-primary {
            background: #ff6a00;
            border: none;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #ff8a33;
            transform: scale(1.05);
        }

        .btn-danger {
            background: #ff2d55;
            border: none;
        }

        .btn-danger:hover {
            background: #ff5c85;
            transform: scale(1.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .user-info img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 10px;
        }

        hr {
            border-color: rgba(255,255,255,0.2);
            margin: 10px 0;
        }

        textarea {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h2>Video Gallery</h2>

    <div class="row">
        {% for v in videos %}
        <div class="col-md-6">
            <div class="video-card">

                <!-- Video -->
                <div class="video-area">
                    <video controls>
                         <source src="{{ v.mediapath.url }}" type="video/mp4"> 
                    </video>
                </div>

                <!-- Card Body -->
                <div class="card-body">

                    <!-- User Info -->
                    <div class="user-info">
                        <img src="https://via.placeholder.com/35" alt="User">
                        <h5>{{ v.name }}</h5>
                    </div>

                    <!-- Description -->
                    <p class="description-box">{{ v.description|slice:":300" }}...</p>

                    <!-- Likes -->
               

                    <hr>
<form action="{% url 'delete_video' v.id %}" method="POST" class="mt-2">
    {% csrf_token %}
    <button class="btn btn-danger btn-sm" onclick="return confirm('Delete this video?');">
        Delete
    </button>
</form>
                    <!-- Comment Form -->
            

              

                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
