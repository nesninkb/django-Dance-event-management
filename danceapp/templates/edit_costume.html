{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Costume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#000,#111);
  color:white;
  padding:40px 15px;
}

.form-container{
  max-width:950px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:35px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
}

.field input, .field select, .field textarea{
  width:100%;
  padding:10px 14px; 
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
}

.variant-row{
  display:flex;
  gap:12px;
  margin-top:12px;
  flex-wrap:wrap;
}

.preview-img{
  width:130px;
  height:130px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

.btn-variant-remove{
  background:#dc3545;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
}

.btn-variant-remove:hover{
  background:#bb2d3b;
}
</style>
</head>

<body>

<div class="form-container">

<a href="{% url 'view_costumes' %}" class="btn btn-light mb-3">← Back</a>

<h3>Edit Costume</h3>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<div class="field">
<input type="text" name="name" value="{{ costume.name }}" required>
</div>
</div>

<div class="mb-3">
<label>Rate (₹)</label>
<div class="field">
<input type="number" name="rate" step="0.01" value="{{ costume.rate }}" required>
</div>
</div>

<div class="mb-3">
<label>Description</label>
<div class="field">
<textarea name="desc">{{ costume.description }}</textarea>
</div>
</div>

<div class="mb-3">
<label>Image</label>
<div class="field">
<input type="file" name="image">
{% if costume.image %}
<img src="{{ costume.image.url }}" class="preview-img">
{% endif %}
</div>
</div>

<hr>

<h5>Variants</h5>

<div id="variantContainer">

{% for variant in costume.variants.all %}
<div class="variant-row">

<select name="size" required>
    <option value="">Select Size</option>
    {% for s in sizes_list %}
        <option value="{{ s }}" {% if variant.size|lower == s|lower %}selected{% endif %}>
            {{ s }}
        </option>
    {% endfor %}
</select>

<input type="color" name="color" value="{{ variant.color }}" required>

<input type="number" name="quantity" value="{{ variant.quantity }}" min="0" required>

<button type="button" class="btn-variant-remove"
        onclick="removeVariant(this)">X</button>

</div>
{% endfor %}

</div>

<button type="button" class="btn btn-secondary mt-3" onclick="addVariant()">
+ Add Variant
</button>

<br><br>
<button type="submit" class="btn btn-light">Update Costume</button>

</form>
</div>

<script>
function addVariant(){
  const container = document.getElementById("variantContainer");

  const div = document.createElement("div");
  div.classList.add("variant-row");

  div.innerHTML = `
    <select name="size" required>
        <option value="">Select Size</option>
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
        <option>XXL</option>
        <option>Free Size</option>
    </select>

    <input type="color" name="color" required>
    <input type="number" name="quantity" min="0" required>

    <button type="button" class="btn-variant-remove"
            onclick="removeVariant(this)">X</button>
  `;

  container.appendChild(div);
}

function removeVariant(button){
  button.closest(".variant-row").remove();
}
</script>

</body>
</html>
