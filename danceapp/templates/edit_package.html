<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Package | Dance Training App</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }

  .container {
    max-width: 520px;
    margin: 60px auto;
    background: #111;
    padding: 35px;
    border-radius: 15px;
    border: 1px solid #222;
    box-shadow: 0 0 30px rgba(255,255,255,0.05);
  }

  h2 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 24px;
    letter-spacing: 1px;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    font-size: 14px;
    color: #ccc;
  }

  input[type="text"],
  input[type="number"],
  textarea,
  input[type="file"] {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #0d0d0d;
    color: #fff;
    font-size: 14px;
    transition: 0.3s;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  input:focus,
  textarea:focus {
    outline: none;
    border: 1px solid #fff;
  }

  .image-preview {
    margin-bottom: 15px;
  }

  .image-preview img {
    width: 120px;
    border-radius: 8px;
    border: 1px solid #333;
    display: block;
    margin-bottom: 10px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background: #ccc;
    transform: translateY(-2px);
  }

</style>
</head>

<body>

<div class="container">
  <h2>Edit Package</h2>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Choice:</label>
    <input type="text" name="choice" value="{{package.type}}" required>

    <label>Package:</label>
    <input type="text" name="package" value="{{package.package_name}}" required>

    <label>Description:</label>
    <textarea name="description" required>{{package.description}}</textarea>

    <label>Fees:</label>
    <input type="number" name="fees" value="{{package.fees}}" required>

    <label>Duration:</label>
    <input type="text" name="duration" value="{{package.duration}}" required>

    <label>How:</label>
    <textarea name="how" required>{{package.how}}</textarea>

    <label>Image:</label>
    <div class="image-preview">
      {% if package.image %}
        <img src="{{ package.image.url }}">
      {% endif %}
      <input type="file" name="image">
    </div>

    <button type="submit">Update Package</button>

  </form>
</div>

</body>
</html>
