{% load static %}
<!DOCTYPE html>
<html lang="en">
   <head>
      <!-- basic -->
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <!-- mobile metas -->
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="viewport" content="initial-scale=1, maximum-scale=1">
      <!-- site metas -->
      <title>Profusion</title>
      <meta name="keywords" content="">
      <meta name="description" content="">
      <meta name="author" content="">
      <!-- bootstrap css -->
      <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
      <!-- style css -->
      <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
      <!-- Responsive-->
      <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
      <!-- fevicon -->
      <link rel="icon" href="{% static 'images/fevicon.png' %}" type="image/gif" />
      <!-- Scrollbar Custom CSS -->
      <link rel="stylesheet" href="{% static 'css/jquery.mCustomScrollbar.min.css' %}">
      <!-- Tweaks for older IEs-->
      <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
      <!-- fonts -->
      <link href="https://fonts.googleapis.com/css?family=Poppins:400,700|Roboto:400,700&display=swap" rel="stylesheet">
      <!-- owl stylesheets --> 
      <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}">
      <link rel="stylesheet" href="{% static 'css/owl.theme.default.min.css' %}">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css" media="screen">

      <style>
         /* Navbar */
         .navbar-brand img {
            height: 70px;
            width: auto;
         }

         .navbar-nav .nav-link {
            font-weight: 600;
            font-size: 16px;
            margin-left: 90px;
            color: #fdf9f9;
         }

         /* Banner */
         .banner_section {
            position: relative;
            height: 100vh;
            overflow: hidden;
         }

         .banner_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
         }

         .video_overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
         }

         .banner_section .container {
            position: relative;
            z-index: 2;
         }

         .banner_taital {
            color: white;
            font-size: 70px;
            font-weight: 700;
            text-transform: uppercase;
         }

         .contact_bt a {
            background-color: #f6815e;
            padding: 12px 30px;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
         }

         .contact_bt a:hover {
            background-color: #ff5733;
         }
      </style>
   </head>
   <body>

      <!-- banner section start -->
      <div class="banner_section">
         <!-- header section start -->
      <div class="header_section">
         <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">

               <!-- Logo -->
               <!-- <a class="navbar-brand d-flex align-items-center" href="/">
                  <img src="{% static 'images/logo.png' %}" alt="Logo">
               </a> -->

               <!-- Toggle Button -->
               <button class="navbar-toggler" type="button"
                     data-toggle="collapse"
                     data-target="#navbarSupportedContent"
                     aria-controls="navbarSupportedContent"
                     aria-expanded="false">
                  <span class="navbar-toggler-icon"></span>
               </button>

               <!-- Menu Items -->
               <div class="collapse navbar-collapse" id="navbarSupportedContent">
                  <ul class="navbar-nav ml-4">

                     <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                     </li>

                     <li class="nav-item">
                        <a class="nav-link" href="/about/">About</a>
                     </li>

                     <li class="nav-item">
                        <a class="nav-link" href="{% url 'select_login' %}">Login</a>
                     </li>

                  </ul>
               </div>

            </nav>
         </div>
      </div>
      <!-- header section end -->
         <!-- Video -->
         <video autoplay muted loop playsinline class="banner_video">
            <source src="{% static 'videos/banner.mp4' %}" type="video/mp4">
         </video>

         <!-- Overlay -->
         <div class="video_overlay"></div>

         <!-- Content -->
         <div class="container h-100 d-flex align-items-center justify-content-center">
            <div id="carouselExampleIndicators" class="carousel slide text-center" data-ride="carousel">

               <ol class="carousel-indicators">
                  <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
                  <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
                  <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
               </ol>

               <div class="carousel-inner">

                  <div class="carousel-item active">
                     <h1 class="banner_taital">Start Dance</h1>
                     <div class="contact_bt mt-4">
                        <!-- <a href="/login/">Read More</a> -->
                     </div>
                  </div>

                  <div class="carousel-item">
                     <h1 class="banner_taital">Dance With Joy</h1>
                     <div class="contact_bt mt-4">
                        <!-- <a href="/login/">Read More</a> -->
                     </div>
                  </div>

                  <div class="carousel-item">
                     <h1 class="banner_taital">Feel The Rhythm</h1>
                     <div class="contact_bt mt-4">
                        <!-- <a href="/login/">Read More</a> -->
                     </div>
                  </div>

               </div>

            </div>
         </div>

      </div>
      <!-- banner section end -->

      <!-- (KEEP YOUR REMAINING PAGE CONTENT SAME AS BEFORE) -->
      <!-- Add your service, about, price, contact, footer sections unchanged -->

      <!-- Javascript files -->
      <script src="{% static 'js/jquery.min.js' %}"></script>
      <script src="{% static 'js/popper.min.js' %}"></script>
      <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
      <script src="{% static 'js/jquery-3.0.0.min.js' %}"></script>
      <script src="{% static 'js/plugin.js' %}"></script>
      <script src="{% static 'js/jquery.mCustomScrollbar.concat.min.js' %}"></script>
      <script src="{% static 'js/custom.js' %}"></script>
      <script src="{% static 'js/owl.carousel.js' %}"></script>

      <script>
         $('.owl-carousel').owlCarousel({
            loop:true,
            margin:35,
            nav:true,
            center: true,
            responsive:{
             0:{ items:1 },
             575:{ items:1 },
             768:{ items:3 },
             1000:{ items:3 }
            }
         })
      </script>
   </body>
</html>
