<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dance App - Register</title>

<style>
:root {
  --bg1: #000000;
  --bg2: #1a1a1a;
  --bg3: #2b2b2b;
  --primary: #ffffff;
  --secondary: #cccccc;
  --text: #ffffff;
  --muted: #aaaaaa;
  --accent: #f2f2f2;
  --panel: rgba(255, 255, 255, 0.06);
  --error: #ff4c4c;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
}

.register-container {
  background: var(--panel);
  backdrop-filter: blur(15px);
  border-radius: 18px;
  padding: 30px;
  width: 370px;
  box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
  text-align: center;
  color: var(--text);
  animation: fadeIn 0.8s ease;
  border: 1px solid rgba(255,255,255,0.08);
}

.register-container h2 {
  font-size: 26px;
  margin-bottom: 6px;
  color: var(--primary);
  letter-spacing: 1px;
}

.register-container p {
  font-size: 13px;
  margin-bottom: 20px;
  color: var(--muted);
}

.input-box {
  margin: 12px 0;
  text-align: left;
}

.input-box label {
  display: block;
  font-size: 13px;
  margin-bottom: 5px;
  color: var(--muted);
}

.input-box input,
.input-box select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  outline: none;
  background: rgba(255,255,255,0.05);
  color: var(--text);
  font-size: 14px;
  transition: 0.3s ease;
}

.input-box input:focus,
.input-box select:focus {
  border-color: #ffffff;
  box-shadow: 0 0 8px rgba(255,255,255,0.3);
}

.input-box input::placeholder {
  color: var(--muted);
}

.gender-options {
  display: flex;
  gap: 15px;
  margin-top: 5px;
  font-size: 13px;
}

.gender-options input {
  accent-color: #ffffff;
}

.register-btn {
  width: 100%;
  padding: 11px;
  margin-top: 18px;
  border: none;
  border-radius: 25px;
  background: #ffffff;
  color: #000000;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}

.register-btn:hover {
  background: #e6e6e6;
  transform: scale(1.05);
}

.extra-links {
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
}

.extra-links a {
  color: #ffffff;
  text-decoration: none;
  font-weight: 500;
}

.extra-links a:hover {
  text-decoration: underline;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-15px); }
  to { opacity: 1; transform: translateY(0); }
}

select option {
  background: #1a1a1a;
  color: #ffffff;
}
</style>
</head>

<body>

<div class="register-container">
  <h2>Dance App</h2>
  <p>Create your account and start dancing!</p>

  <form method="POST">
    {% csrf_token %}

    <div class="input-box">
      <label>Username</label>
      <input type="text" name="username" placeholder="Choose a username" required>
    </div>

    <div class="input-box">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="input-box">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required>
    </div>

    <div class="input-box">
      <label>Confirm Password</label>
      <input type="password" name="confirm_password" placeholder="Re-enter your password" required>
    </div>

    <div class="input-box">
      <label>Gender</label>
      <div class="gender-options">
        <label><input type="radio" name="gender" value="male" required> M</label>
        <label><input type="radio" name="gender" value="female"> F</label>
        <label><input type="radio" name="gender" value="other"> O</label>
      </div>
    </div>

    <div class="input-box">
      <label>District</label>
      <select name="district" required>
        <option value="" disabled selected>Select your district</option>
        <option>Trivandrum</option>
        <option>Kollam</option>
        <option>Pathanamthitta</option>
        <option>Alappuzha</option>
        <option>Kottayam</option>
        <option>Idukki</option>
        <option>Ernakulam</option>
        <option>Thrissur</option>
        <option>Palakkad</option>
        <option>Malappuram</option>
        <option>Kozhikode</option>
        <option>Wayanad</option>
        <option>Kannur</option>
        <option>Kasaragod</option>
      </select>
    </div>

    <button type="submit" class="register-btn">Register</button>
  </form>

  <div class="extra-links">
    <p>Already have an account? <a href="/login/">Login</a></p>
  </div>
</div>

</body>
</html>
