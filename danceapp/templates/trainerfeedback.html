{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Feedback</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Pure Black Background */
            background: #000000;
            color: #ffffff; /* White text */
        }

        form {
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 16px;
            background: #111111; /* Dark background */
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 6px 16px rgba(0, 0, 0, 0.85),
                0 0 8px rgba(255, 255, 255, 0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffffff;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #ffffff; /* White label */
            letter-spacing: 0.4px;
        }

        input,
        textarea {
            width: 100%;
            padding: 13px 14px;
            margin-bottom: 18px;
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            transition: 0.25s ease;
        }

        input::placeholder,
        textarea::placeholder {
            color: #777;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #ffffff; /* White border */
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.35);
            background: #1a1a1a;
        }

        textarea {
            height: 110px;
            resize: none;
        }

        /* ⭐ STAR RATING */
        .rating-box {
            text-align: center;
            margin-bottom: 22px;
        }

        .rating-box span {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .star-rating {
            direction: rtl;
            display: inline-flex;
            font-size: 2.2rem;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            color: #777;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ff8c1a;
        }

        .star-rating input:checked ~ label {
            color: #ff8c1a;
            text-shadow: 0 0 6px rgba(255, 140, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.8px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #bbbbbb);
            color: #000; /* Black text for contrast */
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.35);
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 255, 255, 0.45);
        }

        button:active {
            transform: scale(0.98);
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            padding: 8px 18px;
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 25px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: 0.3s ease;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.15);
        }

        .back-btn:hover {
            background: #222222;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
<a href="/home/" class="back-btn">⬅ Back</a>

    <form method="post">
        {% csrf_token %}

        <h2>Feedback</h2>

        <label for="name">Name</label>
        <input type="text" name="name" id="name" value="{{ user.name }}" required>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ user.email }}" required>

        <label for="message">Message</label>
        <textarea name="message" id="message" placeholder="Write your feedback..." required></textarea>

        <div class="rating-box">
            <span>Your Rating</span>
            <div class="star-rating">
                <input type="radio" id="star5" name="ratings" value="5" required />
                <label for="star5">★</label>

                <input type="radio" id="star4" name="ratings" value="4" />
                <label for="star4">★</label>

                <input type="radio" id="star3" name="ratings" value="3" />
                <label for="star3">★</label>

                <input type="radio" id="star2" name="ratings" value="2" />
                <label for="star2">★</label>

                <input type="radio" id="star1" name="ratings" value="1" />
                <label for="star1">★</label>
            </div>
        </div>

        <button type="submit">Submit Feedback</button>
    </form>

</body>

</html>
