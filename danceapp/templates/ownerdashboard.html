{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Owner Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg: #000;
  --panel: #111;
  --card: #0d0d0d;
  --border: #222;
  --text: #ffffff;
  --muted: #aaaaaa;
  --shadow: 0 0 40px rgba(255,255,255,0.05);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:var(--bg);
  display:flex;
  flex-direction:column;
  align-items:center;
  color:var(--text);
}

/* Navbar */
nav{
  width:90%;
  max-width:1200px;
  margin-top:25px;
  padding:18px 30px;
  background:var(--panel);
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  display:flex;
  justify-content:center;
  align-items:center;
}

nav h1{
  font-size:24px;
  font-weight:700;
  color:#ffffff;
  display:flex;
  align-items:center;
  gap:10px;
}

/* Main */
main{
  flex:1;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
}

/* Dashboard Panel */
.dashboard{
  width:100%;
  max-width:900px;
  padding:45px;
  border-radius:24px;
  background:var(--panel);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  text-align:center;
  animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}

.dashboard h2{
  font-size:32px;
  margin-bottom:10px;
}

.dashboard p{
  color:var(--muted);
  margin-bottom:40px;
  font-size:15px;
}

/* Button Grid */
.buttons{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:25px;
  justify-items:center;
}

/* Buttons */
.btn{
  width:100%;
  max-width:180px;
  aspect-ratio:1/1;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:12px;
  font-weight:600;
  text-decoration:none;
  cursor:pointer;
  transition:all 0.3s ease;
}

.btn:hover{
  transform:translateY(-8px) scale(1.05);
  background:#1a1a1a;
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.btn i{
  font-size:30px;
}

/* Logout */
.btn.logout{
  border:1px solid #444;
}

.btn.logout:hover{
  background:#1a1a1a;
  box-shadow:0 0 20px rgba(255,255,255,0.15);
}

/* Responsive */
@media(max-width:768px){
  .dashboard{
    padding:30px;
  }
  .btn{
    max-width:140px;
  }
}
</style>
</head>

<body>

<nav>
  <h1><i class="fa-solid fa-store"></i> Shop Owner Panel</h1>
</nav>

<main>
  <div class="dashboard">
    <h2>Welcome, Shop Owner 👋</h2>
    <p>Manage your store efficiently with a modern interface</p>

    <div class="buttons">

      <a href="/shop_ownerprofile/" class="btn">
        <i class="fa-regular fa-id-card"></i>
        <span>Profile</span>
      </a>

      <a href="/view_costumes/" class="btn">
        <i class="fa-solid fa-shirt"></i>
        <span>View Costumes</span>
      </a>

      <a href="/view_orders/" class="btn">
        <i class="fa-solid fa-box-open"></i>
        <span>Orders</span>
      </a>

      <button class="btn logout" onclick="confirmLogout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span>Logout</span>
      </button>

    </div>
  </div>
</main>

<script>
function confirmLogout(){
  if(confirm("Are you sure you want to logout?")){
    window.location.href="/logout/";
  }
}
</script>

</body>
</html>
