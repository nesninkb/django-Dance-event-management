<!DOCTYPE html>
<html>
<head>
    <title>{{ trainer.full_name }} - Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #000000, #111111, #222222);
            color: white;
            font-family: Poppins, sans-serif;
        }

        h2 {
            color: white !important;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        .btn-outline-light {
            border-color: white;
            color: white;
        }

        .btn-outline-light:hover {
            background: white;
            color: black;
        }

        .btn-success {
            background: white !important;
            border: 1px solid white !important;
            color: black !important;
        }

        .btn-success:hover {
            background: black !important;
            color: white !important;
            border: 1px solid white !important;
        }

        .card {
            background: rgba(255,255,255,0.08) !important;
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            backdrop-filter: blur(8px);
        }

        small {
            color: #cccccc;
        }

    </style>
</head>

<body>

<div class="container py-5">

<div class="mb-3">
    <a href="{% url 'view_trainer' trainer.id %}" 
       class="btn btn-outline-light">
        ← Back to Trainer
    </a>
</div>

    <h2 class="mb-4">
        {{ trainer.full_name }} - Feedback
    </h2>

    <a href="{% url 'add_trainer_feedback' trainer.id %}" 
       class="btn btn-success mb-4">
       Give Feedback
    </a>

    {% if feedbacks %}
        {% for fb in feedbacks %}
            <div class="card mb-3">
                <div class="card-body">
                    <h6>{{ fb.name }}</h6>
                    <p>{{ fb.message }}</p>
                    <p>⭐ Rating: {{ fb.ratings }}/5</p>
                    <small>{{ fb.created_at }}</small>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p>No feedback available yet.</p>
    {% endif %}

</div>

</body>
</html>
