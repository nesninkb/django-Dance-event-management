{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Shop Owner Profile</title>

  <style>
    :root {
      --bg1: #000000;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --text: #ffffff;
      --panel: rgba(255, 255, 255, 0.07);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("{% static 'images/owner_bg.jpg' %}") center/cover no-repeat;
      opacity: 0.06;
      z-index: 0;
    }

    .edit-box {
      position: relative;
      z-index: 1;
      background: var(--panel);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      width: 90%;
      max-width: 600px;
      animation: fadeIn 0.8s ease;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      color: #fff;
      margin: 0 auto 20px;
      border: 2px solid #ffffff;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 26px;
      letter-spacing: 1px;
    }

    form {
      text-align: left;
    }

    label {
      display: block;
      font-size: 14px;
      color: #cccccc;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      font-size: 15px;
      margin-bottom: 18px;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border: 1px solid #ffffff;
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.1);
    }

    input::file-selector-button {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    input::file-selector-button:hover {
      background: #dddddd;
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .btn {
      width: 48%;
      padding: 12px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid #ffffff;
    }

    .save-btn {
      background: #ffffff;
      color: #000000;
    }

    .save-btn:hover {
      background: #dddddd;
      transform: scale(1.05);
    }

    .cancel-btn {
      background: transparent;
      color: #ffffff;
    }

    .cancel-btn:hover {
      background: #ffffff;
      color: #000000;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .edit-box {
        padding: 25px;
      }

      .btn-group {
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="edit-box">

    <div class="avatar">
      {% if owner.image %}
        <img src="{{ owner.image.url }}" alt="Profile Image">
      {% else %}
        <span>{{ owner.name|first|upper }}</span>
      {% endif %}
    </div>

    <h2>Edit Your Profile</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <label>Name</label>
      <input type="text" name="name" value="{{ owner.name }}" required>

      <label>Email</label>
      <input type="email" name="email" value="{{ owner.email }}" readonly>

      <label>Phone</label>
      <input type="text" name="phone" value="{{ owner.phone }}" required>

      <label>License Number</label>
      <input type="text" name="licenseno" value="{{ owner.licenseno }}" readonly>

      <label>Shop Name</label>
      <input type="text" name="shopname" value="{{ owner.shopname }}">

      <label>Profile Image</label>
      <input type="file" name="image">

      <div class="btn-group">
        <button type="submit" class="btn save-btn">Save Changes</button>
        <a href="{% url 'shop_ownerprofile' %}">
          <button type="button" class="btn cancel-btn">Cancel</button>
        </a>
      </div>

    </form>

  </div>

</body>
</html>
