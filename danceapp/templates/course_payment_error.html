<!DOCTYPE html>
<html>
<head>
  <title>Payment Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-red-50 min-h-screen flex flex-col items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-xl text-center">
    <h1 class="text-3xl text-red-700 font-bold mb-4">Payment Failed</h1>
    <p class="text-lg text-gray-700">
      Sorry, {{ user.name }}. There was an issue processing your payment.
    </p>
    <p class="text-md text-gray-500 mt-2">
      Please try again or contact support if the issue persists.
    </p>
    
    <a href="/course_payment/retry/" class="mt-6 inline-block bg-red-600 text-white px-6 py-2 rounded-full hover:bg-red-700">
      Try Again
    </a>

    <a href="/user_list_institution/" class="mt-4 inline-block text-red-700 underline hover:text-red-800">
      Back to Home
    </a>
  </div>
</body>
</html>
