{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Trainer — Dance App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    :root {
      --bg1: #000000;
      --bg2: #111111;
      --bg3: #222222;
      --text: #ffffff;
      --muted: #cccccc;
      --accent: #ffffff;
      --panel: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(120deg, var(--bg1), var(--bg2), var(--bg3));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--panel);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      text-shadow: 0 0 10px #ffffff;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      outline: none;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: var(--muted);
    }

    input:focus, select:focus {
      box-shadow: 0 0 12px #ffffff;
      background: rgba(255,255,255,0.12);
    }

    input[type="file"] {
      padding: 6px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 15px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 25px;
      border: 1px solid white;
      font-weight: 600;
      cursor: pointer;
      background: black;
      color: white;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-submit {
      background: white;
      color: black;
    }

    .btn-cancel {
      background: black;
      color: white;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #ffffff;
    }

    .current-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      margin-top: 10px;
      object-fit: cover;
      display: block;
      margin-bottom: 15px;
    }

    a {
      color: white;
      text-decoration: underline;
    }

    p {
      color: var(--muted);
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>Edit Trainer</h1>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <label>Full Name</label>
      <input type="text" name="full_name" value="{{ trainer.full_name }}" required>

      <label>Gender</label>
      <select name="gender" required>
        <option value="">Select Gender</option>
        <option value="M" {% if trainer.gender == "M" %}selected{% endif %}>Male</option>
        <option value="F" {% if trainer.gender == "F" %}selected{% endif %}>Female</option>
        <option value="O" {% if trainer.gender == "O" %}selected{% endif %}>Other</option>
      </select>

      <label>Phone Number</label>
      <input type="text" name="phone_number" value="{{ trainer.phone_number }}" required>

      <label>Email</label>
      <input type="email" name="email" value="{{ trainer.email }}" required>

      <label>Current Photo</label>
      {% if trainer.photo %}
        <img src="{{ trainer.photo.url }}" alt="{{ trainer.full_name }}" class="current-photo">
      {% else %}
        <img src="{% static 'images/default_user.png' %}" alt="default" class="current-photo">
      {% endif %}

      <label>Change Photo</label>
      <input type="file" name="photo" accept="image/*">

      <label>Current Portfolio</label>
      {% if trainer.portfolio %}
        <p><a href="{{ trainer.portfolio.url }}" target="_blank">View Uploaded Portfolio</a></p>
      {% else %}
        <p>No portfolio uploaded.</p>
      {% endif %}

      <label>Update Portfolio</label>
      <input type="file" name="portfolio" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.png,.mp4,.mov">

      <label>Dance Styles</label>
      <input type="text" name="dance_styles" value="{{ trainer.dance_styles }}" required>

      <label>Years of Experience</label>
      <input type="number" name="years_of_experience" value="{{ trainer.years_of_experience }}" min="0" required>

      <label>Teaching Experience (Years)</label>
      <input type="number" name="teaching_experience" value="{{ trainer.teaching_experience }}" min="0" required>

      <label>Trainer Type</label>
      <select name="trainer_type" required>
        <option value="">Select Type</option>
        <option value="FT" {% if trainer.trainer_type == "FT" %}selected{% endif %}>Full Time</option>
        <option value="PT" {% if trainer.trainer_type == "PT" %}selected{% endif %}>Part Time</option>
        <option value="GT" {% if trainer.trainer_type == "GT" %}selected{% endif %}>Guest</option>
      </select>

      <div class="checkbox">
        <input type="checkbox" name="is_active" {% if trainer.is_active %}checked{% endif %}>
        <span>Active Trainer</span>
      </div>

      <div class="actions">
        <a href="{% url 'listTrainer' %}">
          <button type="button" class="btn btn-cancel">Cancel</button>
        </a>
        <button type="submit" class="btn btn-submit">Update Trainer</button>
      </div>
    </form>
  </div>
</body>
</html>
