<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Plans</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 1100px;
        background: #111;
        padding: 35px;
        border-radius: 15px;
        border: 1px solid #222;
        box-shadow: 0 0 30px rgba(255,255,255,0.05);
    }

    .title {
        text-align: center;
        font-size: 26px;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    .back-btn {
        display: inline-block;
        background: #fff;
        color: #000;
        padding: 10px 22px;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 25px;
        transition: 0.3s ease;
    }

    .back-btn:hover {
        background: #ccc;
        transform: translateY(-2px);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
        background: #0d0d0d;
    }

    thead {
        background: #fff;
        color: #000;
    }

    thead th {
        padding: 15px;
        font-size: 14px;
        text-transform: uppercase;
        text-align: left;
    }

    tbody tr {
        border-top: 1px solid #222;
        transition: 0.3s ease;
    }

    tbody tr:hover {
        background: #1a1a1a;
    }

    tbody td {
        padding: 14px;
        font-size: 13px;
        color: #ddd;
    }

    .no-users {
        text-align: center;
        margin-top: 25px;
        padding: 20px;
        color: #888;
        font-size: 15px;
    }

    @media screen and (max-width: 768px) {
        table {
            font-size: 12px;
        }

        th, td {
            padding: 8px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1 class="title">Membership Plans</h1>

    <a href="/trainerhome" class="back-btn">Back</a>

    {% if events %}
    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Price</th>
                <th>Ordered At</th>
            </tr>
        </thead>

        <tbody>
            {% for user in events %}
            <tr>
                <td>{{ user.user.username }}</td>
                <td>{{ user.startdate }}</td>
                <td>{{ user.enddate }}</td>
                <td>₹{{ user.price }}</td>
                <td>{{ user.ordered_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    {% else %}
        <div class="no-users">No Membership Plans Found.</div>
    {% endif %}
</div>

</body>
</html>
