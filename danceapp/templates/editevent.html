{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Event | Dance Training App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0f1724;
  --panel: rgba(255,255,255,0.05);
  --text: #e6eef8;
  --muted: #95a0b2;
  --accent: #00eaff;
  --input-bg: rgba(255,255,255,0.08);
  --btn-bg: #007BFF;
  --btn-hover: #0056b3;
  --radius: 14px;
  --shadow: 0 10px 30px rgba(0,0,0,0.5);
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at 10% 10%, rgba(138,43,226,0.06), transparent),
              radial-gradient(circle at 90% 90%, rgba(255,90,95,0.06), transparent),
              var(--bg-dark);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 40px 20px;
  min-height: 100vh;
}

/* Container */
.container {
  width: 100%;
  max-width: 600px;
  background: var(--panel);
  backdrop-filter: blur(12px);
  border-radius: var(--radius);
  padding: 30px;
  box-shadow: var(--shadow);
}

/* Heading */
h2 {
  text-align: center;
  font-size: 26px;
  margin-bottom: 25px;
  color: var(--accent);
  font-weight: 700;
}

/* Labels & Inputs */
label {
  display: block;
  margin: 12px 0 6px;
  font-weight: 600;
  color: var(--text);
}

input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.2);
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  margin-bottom: 15px;
  transition: 0.3s;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  outline: none;
}

/* Submit & Back Buttons */
input[type="submit"], .back-btn {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  text-decoration: none;
  text-align: center;
  color: #fff;
  background: var(--btn-bg);
  transition: 0.3s;
  margin-top: 10px;
}

input[type="submit"]:hover, .back-btn:hover {
  background: var(--btn-hover);
  box-shadow: 0 0 12px var(--accent);
  transform: scale(1.02);
}

/* Responsive */
@media(max-width: 480px) {
  .container { padding: 20px; }
  h2 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="container">
  <h2>Edit Event</h2>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Event Name:</label>
    <input type="text" name="event_name" value="{{ event.name }}" required>

    <label>Institution:</label>
    <select name="institution" required>
      {% for inst in institutions %}
      <option value="{{ inst.id }}" {% if event.institution and  inst.id == event.institution.id  %}selected{% endif %}>{{ inst.name }}</option>
      {% endfor %}
    </select>

    <label>Trainer (Optional):</label>
    <select name="trainer">
      <option value="">Select Trainer</option>
      {% for tr in trainers %}
      <option value="{{ tr.id }}" {% if event.trainer and tr.id == event.trainer.id %}selected{% endif %}>{{ tr.full_name }}</option>
      {% endfor %}
    </select>

    <label>Location:</label>
    <textarea name="location" rows="3">{{ event.location }}</textarea>

    <label>Event Poster:</label>
    <input type="file" name="poster" accept="image/*">

    <label>Start Time:</label>
    <input type="time" name="start_time" value="{{ event.start_time|time:'H:i' }}">

    <label>End Time:</label>
    <input type="time" name="end_time" value="{{ event.end_time|time:'H:i' }}">

    <label>Date:</label>
    <input type="date" name="date" value="{{ event.date|date:'Y-m-d' }}">

    <label>Trainer Position:</label>
    <input type="text" name="trainer_position" value="{{ event.trainer_position }}">

    <label>Age Category:</label>
    <select name="age_category">
        <option value="kids" {% if event.age_category == 'kids' %}selected{% endif %}>Kids</option>
        <option value="teens" {% if event.age_category == 'teens' %}selected{% endif %}>Teens</option>
        <option value="adults" {% if event.age_category == 'adults' %}selected{% endif %}>Adults</option>
    </select>

    <label>Price Per Person:</label>
    <input type="number" name="priceperperson" value="{{ event.priceperperson }}">

    <input type="submit" value="Save Changes">
  </form>

  <a href="{% url 'eventlist' %}" class="back-btn">Back to Event List</a>
</div>

</body>
</html>
