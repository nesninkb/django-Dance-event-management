<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance App - Community</title>
  <style>
    :root {
      --bg1: #ff6a00;
      --bg2: #ee0979;
      --bg3: #7f00ff;
      --text: #fff;
      --muted: #e4d4ec;
      --accent: #00eaff;
      --panel: rgba(0,0,0,0.35);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
    }

    .community-card {
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      width: 350px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      text-align: center;
      color: var(--text);
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      letter-spacing: 1px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .profile-pic-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .profile-pic {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      box-shadow: 0 0 20px var(--bg3);
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-pic:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px var(--accent);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: 2px solid transparent;
      outline: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.1);
      color: var(--text);
      transition: all 0.3s ease;
    }

    input::placeholder, textarea::placeholder {
      color: var(--muted);
    }

    input[type="file"] {
      background: none;
      color: var(--muted);
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    button {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      border: none;
      color: var(--text);
      padding: 12px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
      margin-top: 10px;
      font-weight: 600;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0px 5px 20px var(--accent);
    }
  </style>
</head>
<body>
  <div class="reels-card">
    <h2>Reels</h2>

    <div class="profile-pic-wrapper">
      <img src="https://via.placeholder.com/100" class="profile-pic" id="profilePreview" onclick="document.getElementById('profileImage').click()">
    </div>

    <input type="file" id="profileImage" accept="image/*" style="display:none" onchange="previewProfile(event)">
    <input type="text" placeholder="Name">
    <input type="text" placeholder="Username">
    <textarea rows="3" placeholder="Caption"></textarea>
    <input type="file" accept="video/*">
    <input type="date">
    <input type="time">
    <button>Submit</button>
  </div>

  <script>
    function previewProfile(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('profilePreview').src = e.target.result;
        }
        reader.readAsDataURL(file);
      }
    }
  </script>
</body>
</html>
