{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Select Login | Profusion</title>

   <!-- Bootstrap -->
   <link rel="stylesheet" type="text/css" href="{% static 'css/bootstrap.min.css' %}">
   <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
   <link rel="stylesheet" type="text/css" href="{% static 'css/responsive.css' %}">

   <!-- Fonts (Same as Index) -->
   <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700|Roboto:400,700&display=swap" rel="stylesheet">

   <style>
      body {
         font-family: 'Poppins', sans-serif;
         background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                     url("{% static 'images/banner-img.png' %}") no-repeat center center;
         background-size: cover;
         height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
      }

      .login-container {
         background: #ffffff;
         padding: 40px;
         border-radius: 15px;
         width: 100%;
         max-width: 450px;
         box-shadow: 0px 8px 30px rgba(0,0,0,0.2);
         animation: fadeIn 0.6s ease-in-out;
      }

      .login-container h2 {
         text-align: center;
         font-weight: 700;
         margin-bottom: 30px;
         color: #f6815e;
      }

      .form-control {
         height: 50px;
         border-radius: 8px;
         font-size: 15px;
      }

      .btn-login {
         background-color: #f6815e;
         color: white;
         border: none;
         height: 50px;
         font-weight: 600;
         border-radius: 8px;
         transition: 0.3s;
      }

      .btn-login:hover {
         background-color: #e66a48;
      }

      .back-home {
         text-align: center;
         margin-top: 20px;
      }

      .back-home a {
         color: #f6815e;
         text-decoration: none;
         font-weight: 500;
      }

      @keyframes fadeIn {
         from {opacity: 0; transform: translateY(20px);}
         to {opacity: 1; transform: translateY(0);}
      }
   </style>
</head>

<body>

   <div class="login-container">
      <h2>Select Login Type</h2>

      <div class="form-group">
         <label>Select User Type</label>
         <select class="form-control" id="userType">
            <option value="">-- Choose User Type --</option>
            <option value="/login/">User Login</option>
            <option value="/trainerlogin/">Trainer Login</option>
            <option value="/owner_login/">Shop Owner Login</option>
            <option value="/institutionlogin/">Institution Login</option>
            <option value="/adminlogin/">Admin Login</option>
         </select>
      </div>

      <div class="text-center mt-4">
   <button class="btn btn-login px-5" onclick="redirectLogin()">
      Continue
   </button>
</div>

      <div class="back-home">
         <a href="/">← Back to Home</a>
      </div>
   </div>

   <script>
      function redirectLogin(){
         var type = document.getElementById("userType").value;
         if(type != ""){
            window.location.href = type;
         } else {
            alert("Please select a user type.");
         }
      }
   </script>

</body>
</html>
