<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trainer Login</title>

  <style>
    :root {
      --bg1: #000000;
      --bg2: #1a1a1a;
      --bg3: #2b2b2b;
      --text: #ffffff;
      --muted: #bfbfbf;
      --panel: rgba(255, 255, 255, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text);
    }

    .login-container {
      background: var(--panel);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px 30px;
      width: 350px;
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
      text-align: center;
      animation: fadeUp 0.8s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 45px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 6px;
      letter-spacing: 1px;
      color: #ffffff;
    }

    h3 {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    p {
      font-size: 14px;
      margin-bottom: 20px;
      color: var(--muted);
    }

    .input-box {
      margin: 15px 0;
      text-align: left;
    }

    .input-box label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 500;
    }

    .input-box input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      outline: none;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 14px;
      transition: 0.3s;
    }

    .input-box input::placeholder {
      color: var(--muted);
    }

    .input-box input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 25px;
      background: #ffffff;
      color: #000000;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #e6e6e6;
      transform: scale(1.05);
    }

    .extra-links {
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .extra-links a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 400px){
      .login-container {
        padding: 30px 20px;
        width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo">🕺</div>
    <h2>Trainer Login</h2>
    <p>Log in to manage your classes</p>
    <h3>LUMINA</h3>

    <form method="POST">
      {% csrf_token %}
      <div class="input-box">
        <label for="email">Trainer Email</label>
        <input type="text" id="email" name="email" placeholder="Enter your Trainer Email" required />
      </div>

      <div class="input-box">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra-links">
      <p><a href="#">Forgot Password?</a></p>
      <p><a href="/trainer_registration/">Register</a></p>
    </div>
  </div>
</body>
</html>
