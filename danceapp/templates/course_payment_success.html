<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: #ffffff;
      max-width: 420px;
      width: 100%;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .success-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #e8f5e9;
      color: #2e7d32;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
    }

    h1 {
      color: #2e7d32;
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      color: #555;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .home-btn {
      display: inline-block;
      padding: 12px 30px;
      background: #2e7d32;
      color: #ffffff;
      border-radius: 30px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .home-btn:hover {
      background: #1b5e20;
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="success-icon">✓</div>

    <h1>Payment Successful!</h1>
    <p>Thank you, {{ user.name }}. Your payment has been processed.</p>

    <a href="/user_list_institution/" class="home-btn">Back to Home</a>
  </div>

</body>
</html>
