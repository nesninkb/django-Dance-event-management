<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop Owner Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --card: #0d0d0d;
      --border: #222;
      --text: #ffffff;
      --muted: #aaaaaa;
      --accent: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      color: var(--text);
    }

    .login-box {
      width: 380px;
      padding: 40px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(255,255,255,0.05);
      text-align: center;
      transition: 0.3s ease;
    }

    .login-box:hover {
      transform: translateY(-5px);
    }

    .login-box h2 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 600;
      color: var(--accent);
    }

    .login-box p {
      font-size: 14px;
      margin-bottom: 25px;
      color: var(--muted);
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: 0.3s ease;
    }

    input::placeholder {
      color: var(--muted);
    }

    input:focus {
      border-color: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 30px;
      background: #ffffff;
      color: #000;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #cccccc;
      transform: scale(1.03);
    }

    .link {
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
    }

    .link a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 420px) {
      .login-box {
        width: 90%;
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>🛍️ Shop Owner Login</h2>
    <p>Access your dashboard securely</p>

    <form method="POST">
      {% csrf_token %}

      <label>Email</label>
      <input type="email" name="email" placeholder="Enter your email" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required>

      <button type="submit">Login</button>
    </form>

    <div class="link">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don't have an account? <a href="/owner_register/">Sign Up</a></p>
    </div>
  </div>

</body>
</html>
