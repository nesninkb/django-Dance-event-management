<!doctype html>
<html lang="en">
{% load static %}
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Event</title>

<style>
:root{
  --bg1:#000;
  --bg2:#111;
  --bg3:#222;
  --glass:rgba(255,255,255,0.08);
  --glass-hover:rgba(255,255,255,0.15);
  --accent:#fff;
  font-family:'Poppins',system-ui,sans-serif;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  color:#fff;
}

/* FORM CONTAINER */
.form-wrap{
  width:100%;
  max-width:650px;
  background:var(--glass);
  border-radius:26px;
  padding:30px;
  backdrop-filter:blur(18px);
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

h2{
  margin-top:0;
  text-align:center;
  letter-spacing:1px;
  color:var(--accent);
}

/* FORM ELEMENTS */
.form-group{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:13px;
  margin-bottom:6px;
  opacity:.9;
}

input, textarea, select{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:none;
  outline:none;
  font-size:14px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

textarea{
  resize:none;
  height:90px;
}

input[type="file"]{
  padding:8px;
  background:none;
}

input::placeholder, textarea::placeholder{
  color:#ccc;
}

/* Dropdown custom styling */
select {
  background-color: rgba(255,255,255,0.12);
  color: #fff;
  border-radius: 14px;
  padding: 12px 14px;
  border: none;
  outline: none;
  font-size: 14px;
  cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg fill='white' height='14' viewBox='0 0 24 24' width='14' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 14px 14px;
}

/* Dropdown options text color */
select option {
  background-color: rgba(0,0,0,0.9);
  color: #fff;
}

/* BUTTONS */
.btn-row{
  display:flex;
  gap:14px;
  margin-top:20px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:30px;
  border:none;
  font-weight:800;
  cursor:pointer;
  transition:.3s;
}

.save{
  background:#fff;
  color:#111;
}

.cancel{
  background:rgba(255,255,255,0.2);
  color:#fff;
}

.btn:hover{
  transform:scale(1.08);
  filter: brightness(1.2);
}

/* MOBILE */
@media(max-width:600px){
  .form-wrap{padding:22px}
}
</style>
</head>

<body>

<div class="form-wrap">
  <h2>Add Event</h2>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="form-group">
      <label>Event Name</label>
      <input type="text" name="name" placeholder="Event name" required>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Event description"></textarea>
    </div>

    <div class="form-group">
      <label>Trainer</label>
      <select name="trainer">
        <option value="">-- Select Trainer --</option>
        {% for trainer in trainers %}
          <option value="{{ trainer.id }}">{{ trainer.full_name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Trainer Position</label>
      <input type="text" name="trainer_position" placeholder="e.g. Choreographer">
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" required>
    </div>

    <div class="form-group">
      <label>Start Time</label>
      <input type="time" name="start_time" required>
    </div>

    <div class="form-group">
      <label>End Time</label>
      <input type="time" name="end_time">
    </div>

    <div class="form-group">
      <label>Location</label>
      <input type="text" name="location" placeholder="Event location">
    </div>

    <div class="form-group">
      <label>Age Category</label>
      <select name="age_category">
        <option value="">-- Select Age Category --</option>
        <option value="kids">Kids</option>
        <option value="teens">Teens</option>
        <option value="adults">Adults</option>
      </select>
    </div>

    <div class="form-group">
      <label>Poster</label>
      <input type="file" name="poster" accept="image/*">
    </div>

    <div class="form-group">
      <label>Status</label>
      <select name="status">
        <option value="UP">Upcoming</option>
        <option value="CO">Completed</option>
        <option value="CA">Cancelled</option>
      </select>
    </div>

    <div class="form-group">
      <label>Price Per Person</label>
      <input type="number" name="priceperperson" placeholder="Price Per Person" required>
    </div>

    <div class="form-group">
      <label>Assign Venue (Optional)</label>
      <select name="venue">
        <option value="">-- No Venue Assigned --</option>
        {% for v in venues %}
          <option value="{{ v.id }}">{{ v.name }} ({{ v.total_seats }} seats)</option>
        {% endfor %}
      </select>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn save">Save Event</button>
      <a href="{% url 'institution_events' %}" class="btn cancel">Cancel</a>
    </div>

  </form>
</div>

</body>
</html>
