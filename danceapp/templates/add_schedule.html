<!DOCTYPE html>
<html>
<head>
    <title>Add Trainer Schedule</title>
</head>
<body>

    <h2>Add Trainer Schedule</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Trainer -->
        <label>Trainer:</label><br>
        <select name="trainer" required>
            <option value="">-- Select Trainer --</option>
            {% for trainer in trainers %}
                <option value="{{ trainer.id }}">{{ trainer.name }}</option>
            {% endfor %}
        </select>
        <br><br>

        <!-- Day -->
        <label>Day:</label><br>
        <select name="day" required>
            <option value="">-- Select Day --</option>
            <option value="Mon">Monday</option>
            <option value="Tue">Tuesday</option>
            <option value="Wed">Wednesday</option>
            <option value="Thu">Thursday</option>
            <option value="Fri">Friday</option>
            <option value="Sat">Saturday</option>
            <option value="Sun">Sunday</option>
        </select>
        <br><br>

        <!-- Dance Style -->
        <label>Dance Style:</label><br>
        <input type="text" name="dance_style" placeholder="Hip-hop / Classical" required>
        <br><br>

        <!-- Batch Name -->
        <label>Batch:</label><br>
        <input type="text" name="batch_name" placeholder="Beginner / Advanced" required>
        <br><br>

        <!-- Start Time -->
        <label>Start Time:</label><br>
        <input type="time" name="start_time" required>
        <br><br>

        <!-- End Time -->
        <label>End Time:</label><br>
        <input type="time" name="end_time" required>
        <br><br>

        <!-- Duration -->
        <label>Duration (minutes):</label><br>
        <input type="number" name="duration" required>
        <br><br>

        <!-- Max Students -->
        <label>Maximum Students:</label><br>
        <input type="number" name="max_students" required>
        <br><br>

        <button type="submit">Add Schedule</button>
    </form>

</body>
</html>
