<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Success</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f5e9, #fce4ec);
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .success-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #e8f5e9;
      color: #2e7d32;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #555;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .divider {
      height: 1px;
      background: #ddd;
      margin: 20px 0;
    }

    .total {
      font-size: 20px;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 25px;
    }

    .pay-btn {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: #d81b60;
      color: #ffffff;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .pay-btn:hover {
      background: #ad1457;
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="success-icon">✓</div>

    <h1>Thank you, {{ user.name }}!</h1>
    <p>Your order has been placed successfully.</p>

    <div class="divider"></div>

    <div class="total">
      Grand Total: ₹{{ total }}
    </div>

    <form action="/course_payment/{{ id }}/" method="post">
      {% csrf_token %}
      <input type="hidden" name="price" value="{{ total }}">
      <button type="submit" class="pay-btn">
        Make Payment
      </button>
    </form>
  </div>

</body>
</html>
