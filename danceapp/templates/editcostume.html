<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Costume</title>

  <style>
    :root {
      --bg: #0A1931;        /* Background */
      --card: #4A7FA7;      /* Form Box */
      --text: #F6FAFD;      /* Text */
      --muted: #e2ecf3;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 40px 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      width: 95%;
      max-width: 480px;
      background: var(--card);
      padding: 25px 30px;
      border-radius: 18px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.25);
      color: var(--text);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
    }

    label {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 18px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.15);
      color: var(--text);
      font-size: 14px;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    .image-preview {
      width: 100%;
      height: 200px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text);
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #0A1931;
      color: #F6FAFD;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.88;
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Edit Costume</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Image Preview -->
      <div id="preview" class="image-preview"
           style="background-image: url('{{ costume.image.url }}');">
        {% if not costume.image %}
          No Image Uploaded
        {% endif %}
      </div>

      <label>Costume Name</label>
      <input type="text" name="name" value="{{ costume.name }}" placeholder="Enter costume name">

      <label>Color</label>
      <input type="text" name="color" value="{{ costume.color }}" placeholder="Enter color">

      <label>Size</label>
      <input type="text" name="size" value="{{ costume.size }}" placeholder="Enter size">

      <label>Rate (₹)</label>
      <input type="number" step="0.01" name="rate" value="{{ costume.rate }}" placeholder="Enter rate">

      <label>Update Image</label>
      <input type="file" name="image" id="imageInput" accept="image/*">

      <label>Description</label>
      <textarea name="description" placeholder="Enter description">{{ costume.description }}</textarea>

      <button type="submit">Update Costume</button>
    </form>
  </div>

<script>
  const imageInput = document.getElementById("imageInput");
  const preview = document.getElementById("preview");

  imageInput.addEventListener("change", function (e) {
    const file = e.target.files[0];
    if (file) {
      preview.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
      preview.innerHTML = "";
    }
  });
</script>

</body>
</html>
