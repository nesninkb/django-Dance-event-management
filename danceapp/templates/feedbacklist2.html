<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Users</title>

  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --muted: #aaa;
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.2);
    }

    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: var(--panel);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(255,255,255,0.05);
      position: relative;
    }

    /* HOME BUTTON */
    .home-btn {
      position: absolute;
      left: 15px;
      top: -50px;
      background: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      color: #000;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .home-btn:hover {
      background: #ddd;
      transform: scale(1.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* Search */
    .search-bar input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .search-bar input::placeholder {
      color: var(--muted);
    }

    /* Filters */
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .filters button {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .filters button:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.05);
    }

    /* Feedback Card */
    .feedback-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .feedback-item:hover {
      background: rgba(255,255,255,0.12);
    }

    .details h4 {
      margin: 0;
      font-size: 16px;
    }

    .details p {
      margin: 3px 0;
      font-size: 14px;
      color: var(--muted);
    }

    .rating {
      font-size: 13px;
      margin-top: 5px;
      color: #fff;
    }

    /* Delete Button */
    .delete-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.3s;
    }

    .delete-btn:hover {
      background: #ddd;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">

    <a href="/adminhome/" class="home-btn">← Home</a>

    <h2>Feedback Users</h2>
    
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Search feedback...">
    </div>

    <div class="filters">
      <button onclick="filterRating('all')">All</button>
      <button onclick="filterRating('5')">5 ★</button>
      <button onclick="filterRating('4')">4 ★</button>
      <button onclick="filterRating('3')">3 ★</button>
      <button onclick="filterRating('2')">2 ★</button>
      <button onclick="filterRating('1')">1 ★</button>
    </div>

    {% for fb in feedback %}
    <div class="feedback-item" data-name="{{fb.name}}" data-message="{{fb.message}}" data-rating="{{fb.rating}}">
      <div class="user-info">
        <div class="details">
          <h4>{{fb.name}}</h4>
          <p>{{fb.message}}</p>
          <div class="rating">{{fb.rating}} stars</div>
        </div>
      </div>
      <a href="/deletefeedback/{{fb.id}}">
        <button class="delete-btn">Delete</button>
      </a>
    </div>
    {% endfor %}

  </div>

<script>
document.getElementById("searchInput").addEventListener("keyup", function () {
    let value = this.value.toLowerCase();
    document.querySelectorAll(".feedback-item").forEach(item => {
        let name = item.dataset.name.toLowerCase();
        let message = item.dataset.message.toLowerCase();
        item.style.display = (name.includes(value) || message.includes(value)) ? "flex" : "none";
    });
});

function filterRating(rating) {
    document.querySelectorAll(".feedback-item").forEach(item => {
        item.style.display = (rating === "all" || item.dataset.rating === rating) ? "flex" : "none";
    });
}
</script>

</body>
</html>
