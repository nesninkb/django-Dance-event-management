<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costume Collection</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --primary: #ffffff;
      --secondary: #cfcfcf;
      --muted: #8a8a8a;
      --glass: rgba(255, 255, 255, 0.04);
      --card-glass: rgba(255, 255, 255, 0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      padding: 50px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      border-radius: 30px;
      padding: 50px;
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
      position: relative;
      animation: fadeIn 0.8s ease;
    }

    h2 {
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    /* Top Buttons */

    .home-btn,
    .order-btn {
      position: absolute;
      top: 30px;
      padding: 10px 22px;
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
      background: #ffffff;
      color: #000000;
      transition: 0.3s ease;
    }

    .home-btn { left: 30px; }
    .order-btn { right: 30px; }

    .home-btn:hover,
    .order-btn:hover {
      transform: scale(1.07);
      opacity: 0.85;
    }

    /* Search */

    .search-bar {
      margin-bottom: 40px;
      text-align: center;
    }

    .search-bar input {
      width: 100%;
      max-width: 450px;
      padding: 14px;
      border-radius: 25px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: var(--primary);
      outline: none;
      text-align: center;
      transition: 0.3s;
    }

    .search-bar input:focus {
      border: 1px solid #ffffff;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }

    .search-bar input::placeholder {
      color: var(--muted);
    }

    /* Grid */

    .costume-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 35px;
    }

    .costume-card {
      background: var(--card-glass);
      backdrop-filter: blur(18px);
      border-radius: 25px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .costume-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(255,255,255,0.15);
    }

    .costume-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 20px;
      transition: 0.4s ease;
    }

    .costume-card:hover img {
      transform: scale(1.05);
    }

    .costume-name {
      margin-top: 15px;
      font-size: 19px;
      font-weight: 600;
    }

    .costume-quantity {
      font-size: 14px;
      color: var(--secondary);
      margin-top: 6px;
    }

    /* Buttons */

    .btn-buy,
    .cart {
      display: block;
      width: 100%;
      height: 46px;
      line-height: 46px;
      margin-top: 14px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      background: #ffffff;
      color: #000000;
      transition: 0.3s ease;
    }

    .btn-buy:hover,
    .cart:hover {
      transform: scale(1.08);
      opacity: 0.9;
      box-shadow: 0 10px 20px rgba(255,255,255,0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>

  <script>
    function searchCostume() {
      let input = document.getElementById("searchInput").value.toLowerCase();
      let items = document.getElementsByClassName("costume-card");

      for (let i = 0; i < items.length; i++) {
        let name = items[i].querySelector(".costume-name").innerText.toLowerCase();
        items[i].style.display = name.includes(input) ? "" : "none";
      }
    }
  </script>

</head>

<body>

<div class="container">

  <a href="/home/" class="home-btn">Home</a>
  <a href="/user_orders_list/" class="order-btn">📦 View Orders</a>

  <h2>💃 Costume Collection</h2>

  <div class="search-bar">
    <input type="text" id="searchInput" onkeyup="searchCostume()" placeholder="Search costumes...">
  </div>

  <div class="costume-grid">
    {% for costume in costumes %}
    <div class="costume-card">
      <img src="{{ costume.image.url }}" alt="">
      <div class="costume-name">{{ costume.name }}</div>
      <div class="costume-quantity">{{ costume.quantity }}</div>

      <a href="{% url 'costume_detail' costume.id %}" class="btn-buy">View</a>
      <a href="{% url 'addtocart' costume.id %}" class="btn-buy">Buy Now</a>
      <!-- <a href="{% url 'buynow' costume.id %}" class="cart">Buy Now</a> -->
    </div>
    {% endfor %}
  </div>

</div>

</body>
</html>
