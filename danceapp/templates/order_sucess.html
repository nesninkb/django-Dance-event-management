<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Success</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 min-h-screen flex flex-col items-center justify-center px-4">
  <div class="bg-white shadow-xl rounded-xl p-8 max-w-lg w-full text-center">
    <h1 class="text-3xl font-bold text-green-700 mb-4">Thank you, {{ user.name }}!</h1>
    <p class="text-lg text-gray-700 mb-4">Your order has been placed successfully.</p>

    <!-- Total Price Display -->
    <div class="text-xl text-green-800 font-semibold mb-6">
      Grand Total: ₹{{ total }}
    </div>

    <!-- Payment Button -->
    <form action="/payment/" method="post">
      {% csrf_token %}
      <input type="hidden" name="amount" value="{{ total }}">
      <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white px-6 py-2 rounded-full text-lg font-medium">
        Make Payment
      </button>
    </form>

    {% comment %} <!-- Go Back Button -->
    <div class="mt-6">
      <a href="/userindex/" class="text-sm text-gray-500 hover:text-gray-800">← Back to Home</a>
    </div> {% endcomment %}
  </div>
</body>
</html>
