<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paid Media Class Details</title>

  <style>
    :root {
      --bg1: #ff6a00;
      --bg2: #ee0979;
      --text: #ffffff;
      --accent: #00eaff;
    }

    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .upload-container {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 35px;
      width: 420px;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    h2 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    label {
      margin-top: 15px;
      display: block;
      font-size: 14px;
      opacity: 0.9;
      font-weight: 600;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    textarea {
      resize: none;
    }

    input[type="file"] {
      margin-top: 10px;
      color: #fff;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--accent);
      color: #101010;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #00f7ff;
    }

    select option {
      background: #222;
    }
  </style>
</head>
<body>

  <div class="upload-container">
    <h2>Paid Media Class Details 🎥</h2>

    <form action="/paidmedia/" method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <label>Session Name</label>
      <input type="text" name="session_name" required>

      <label>Session Number</label>
      <input type="text" name="session_number" required>

      <label>Trainer Email</label>
      <input type="text" name="trainer_email" required>

      <label>Language</label>
      <select name="language" required>
        <option value="">Select Language</option>
        <option value="English">English</option>
        <option value="Malayalam">Malayalam</option>
        <option value="Hindi">Hindi</option>
      </select>

      <label>Description</label>
      <textarea name="description" rows="4" required></textarea>

      <label>Upload Class Video</label>
      <input type="file" name="class_video" accept="video/*" required>

      <label>Start Date</label>
      <input type="date" name="start_date" required>

      <label>End Date</label>
      <input type="date" name="end_date" required>

      <label>Status</label>
      <select name="status" required>
        <option value="">Select Status</option>
        <option value="Not Started">Not Started</option>
        <option value="Ongoing">Ongoing</option>
        <option value="Completed">Completed</option>
      </select>

      <button type="submit">Save Details</button>

    </form>
  </div>

</body>
</html>
