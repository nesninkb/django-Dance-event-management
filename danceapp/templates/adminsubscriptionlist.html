<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:40px;
}

/* CONTAINER */

.container{
    width:95%;
    max-width:1100px;
    background:#111;
    padding:30px;
    border-radius:14px;
    box-shadow:0 0 25px rgba(255,255,255,0.08);
}

/* TITLE */

.title{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-bottom:25px;
    color:#fff;
    letter-spacing:1px;
}

/* BACK BUTTON */

.back-btn{
    display:inline-block;
    background:#fff;
    color:#000;
    padding:10px 22px;
    text-decoration:none;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    margin-bottom:20px;
    transition:0.3s;
}

.back-btn:hover{
    background:#ddd;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:#0a0a0a;
    border-radius:10px;
    overflow:hidden;
}

/* TABLE HEADER */

thead{
    background:#fff;
    color:#000;
}

thead th{
    padding:14px;
    font-size:15px;
    font-weight:600;
}

/* TABLE BODY */

tbody td{
    padding:14px;
    text-align:center;
    color:#ddd;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

/* HOVER EFFECT */

tbody tr:hover{
    background:#1a1a1a;
    transition:0.3s;
}

/* NO DATA */

.no-users{
    text-align:center;
    margin-top:20px;
    font-size:18px;
    color:#fff;
}

/* RESPONSIVE */

@media(max-width:768px){

.container{
    padding:20px;
}

thead th,
tbody td{
    font-size:13px;
    padding:10px;
}

}

</style>
</head>

<body>

<div class="container">

<a href="/adminhome/" class="back-btn">Back</a>

<h1 class="title">Membership Plans</h1>

{% if events %}

<table>

<thead>
<tr>
<th>User</th>
<th>Start Date</th>
<th>End Date</th>
<th>Price</th>
<th>Ordered At</th>
</tr>
</thead>

<tbody>

{% for user in events %}

<tr>
<td>{{ user.user.username }}</td>
<td>{{ user.startdate }}</td>
<td>{{ user.enddate }}</td>
<td>{{ user.price }}</td>
<td>{{ user.ordered_at }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% else %}

<div class="no-users">No Membership Plans Found.</div>

{% endif %}

</div>

</body>
</html>
