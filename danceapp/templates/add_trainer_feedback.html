<!DOCTYPE html>
<html>
<head>
    <title>Add Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#0a0016; color:white; font-family:Poppins;">

<div class="container py-5">

    <h2 style="color:#ff4de7;">
        Give Feedback to {{ trainer.full_name }}
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Your Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Message</label>
            <textarea name="message" class="form-control" required></textarea>
        </div>

        <div class="mb-3">
            <label>Rating (1-5)</label>
            <input type="number" name="ratings" min="1" max="5" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">
            Submit Feedback
        </button>

        <a href="{% url 'trainer_feedback_list' trainer.id %}" 
           class="btn btn-secondary">
           Cancel
        </a>

    </form>

</div>

</body>
</html>
