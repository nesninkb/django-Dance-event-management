<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg1: #000000;
    --bg2: #1a1a1a;
    --bg3: #2b2b2b;
    --text: #ffffff;
    --muted: #bfbfbf;
    --accent1: #ff0099;
    --accent2: #7a00ff;
    --panel: rgba(255,255,255,0.06);
    --radius: 20px;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body {
    background: radial-gradient(circle at top, var(--bg3), var(--bg1));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 15px;
}

/* Event Card */
.event-box {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    animation: fadeIn 1.2s ease;
    transition: transform 0.3s, box-shadow 0.3s;
}
.event-box:hover {
    transform: scale(1.02);
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
}

h2 {
    font-size: 2rem;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    color: transparent;
    text-align: center;
    margin-bottom: 20px;
    font-weight: 700;
}

/* Info Text */
.info {
    margin-bottom: 12px;
    font-size: 16px;
    color: var(--muted);
    line-height: 1.5;
}
.highlight {
    font-weight: 600;
    color: var(--accent2);
}

/* Buttons */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 18px;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 0 15px rgba(255,0,200,0.5);
}

.btn-primary {
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    color: var(--text);
}
.btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 0 22px rgba(255,0,200,0.8);
}

.btn-back {
    background: transparent;
    border: 1.5px solid var(--accent1);
    color: var(--accent2);
}
.btn-back:hover {
    background: var(--accent1);
    color: #fff;
    box-shadow: 0 0 20px var(--accent1);
    transform: translateY(-2px);
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media(max-width: 500px){
    .event-box {
        padding: 20px;
    }
    h2 { font-size: 1.6rem; }
    .info { font-size: 14px; }
}
</style>
</head>
<body>

<div class="event-box">
    <h2>{{ event.name }}</h2>

    <p class="info"><span class="highlight">Date:</span> {{ event.date }}</p>
    <p class="info"><span class="highlight">Time:</span> {{ event.start_time }} - {{ event.end_time }}</p>
    <p class="info"><span class="highlight">Venue:</span> {{ event.location }}</p>
    <p class="info"><span class="highlight">Instructor:</span> {{ event.trainer.full_name }}</p>
    <p class="info"><span class="highlight">Category:</span> {{ event.status }}</p>
    <p class="info"><span class="highlight">Description:</span><br>{{ event.description }}</p>
    <p class="info"><span class="highlight">Price Per Person:</span> ₹{{ event.priceperperson }}</p>

    <a href="/register_event/{{ event.id }}">
        <button class="btn btn-primary">Register Now 📝</button>
    </a>

    <a href="/usereventlist/">
        <button class="btn btn-back">⬅ Back</button>
    </a>
</div>

</body>
</html>
