{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institution Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-dark: #000000;
            --bg-light: #111111;
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #bfbfbf;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-light));
            color: var(--text-main);
        }

        /* Home Button */
        .home-btn {
            position: absolute;
            top: 25px;
            left: 30px;
            padding: 8px 18px;
            background: transparent;
            color: var(--white);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            transition: 0.3s ease;
        }

        .home-btn:hover {
            background: var(--white);
            color: #000;
        }

        /* Login Box */
        .login-box {
            width: 380px;
            padding: 45px 35px;
            border-radius: 18px;
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Input Fields */
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--white);
            font-size: 14px;
            outline: none;
            transition: 0.3s ease;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus {
            border-color: var(--white);
            background: rgba(255,255,255,0.08);
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid var(--white);
            background: transparent;
            color: var(--white);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: var(--white);
            color: #000;
        }

        /* Signup Link */
        .signup-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: 0.3s ease;
        }

        .signup-link a:hover {
            border-bottom: 1px solid var(--white);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 420px) {
            .login-box {
                width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

    <a href="/" class="home-btn">← Home</a>

    <div class="login-box">
        <h2>Institution Login</h2>

        <form method="post">
            {% csrf_token %}

            <input type="email" name="email" placeholder="Institution Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="signup-link">
            Don’t have an account?
            <a href="{% url 'institution' %}">Register Here</a>
        </div>
    </div>

</body>
</html>
